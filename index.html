        function excelSerialToDate(serial) {
            serial = Number(serial);
            // Adjust for Excel's Lotus 123 bug (Feb 29, 1900 doesn't exist)
            if (serial > 60) serial--;
            const date = new Date(Date.UTC(1900, 0, serial));
            const d = String(date.getUTCDate()).padStart(2, '0');
            const m = String(date.getUTCMonth() + 1).padStart(2, '0');
            const y = String(date.getUTCFullYear()).slice(-2);
            return d + '/' + m + '/' + y;
        }

        function isExcelDateSerial(val) {
            return val.match(/^\d{5}$/) && Number(val) >= 1 && Number(val) <= 73050;
        }

        function parseAndPlot(tabId) {
            const tab = tabs.find(t => t.id === tabId);
            const input = document.getElementById('dataInput_' + tabId).value.trim();
            const statusEl = document.getElementById('status_' + tabId);
            
            tab.graphTitle = document.getElementById('graphTitle_' + tabId).value || 'Trial Results';
            tab.yAxisLabel = document.getElementById('yAxisLabel_' + tabId).value || 'Green Coverage (%)';
            tab.xAxisLabel = document.getElementById('xAxisLabel_' + tabId).value || 'Assessment Date';
            tab.yAxisMin = parseFloat(document.getElementById('yAxisMin_' + tabId).value) || 0;
            tab.yAxisMax = parseFloat(document.getElementById('yAxisMax_' + tabId).value) || 100;
            tab.yAxisPercent = document.getElementById('yAxisPercent_' + tabId).classList.contains('active');

            if (!input) {
                statusEl.className = 'status error';
                statusEl.textContent = 'Please paste some data first';
                return;
            }

            try {
                const lines = input.split('\n').filter(l => l.trim());
                if (lines.length < 2) throw new Error('Need at least header and one data row');

                const headerParts = lines[0].split('\t').map(h => h.trim());
                
                // Find the first column that looks like a date (dd.mm.yy, dd/mm/yy, or contains digits with separators)
                // This determines where the data columns start
                let firstDataCol = 1;
                for (let i = 0; i < headerParts.length; i++) {
                    const val = headerParts[i];
                    // Match date patterns: dd.mm.yy, dd/mm/yy, dd-mm-yy, or DAT patterns
                    if (val && (val.match(/^\d{1,2}[.\/-]\d{1,2}[.\/-]\d{2,4}$/) || val.match(/^\d+DAT/i) || isExcelDateSerial(val))) {
                        firstDataCol = i;
                        break;
                    }
                }
                
                // Extract dates from header starting from first data column
                const dates = [];
                for (let i = firstDataCol; i < headerParts.length; i++) {
                    const val = headerParts[i];
                    // Accept dates or DAT patterns, skip empty or letter-only headers
                    if (val && !val.match(/^[a-z]+$/i)) {
                        dates.push(isExcelDateSerial(val) ? excelSerialToDate(val) : val);
                    }
                }

                const treatments = [];
                for (let i = 1; i < lines.length; i++) {
                    const parts = lines[i].split('\t').map(cell => cell.trim());
                    if (parts.length < 2) continue;

                    // Combine all columns before firstDataCol into the treatment name
                    let nameParts = [];
                    for (let j = 0; j < firstDataCol; j++) {
                        let part = (parts[j] || '').replace(/^\[\d+\]\s*/, '').trim();
                        if (part && part !== '-') {
                            nameParts.push(part);
                        }
                    }
                    let name = nameParts.join(' - ');
                    
                    if (!name) continue;

                    // Stop parsing if we hit a repeated header row (second table pasted below)
                    if (headerParts[0] && name.toLowerCase() === headerParts[0].toLowerCase()) break;

                    // Skip statistical rows and DAT header rows
                    if (name.match(/^(P|LSD|d\.f\.|%c\.v\.|SED|CV|DAT)$/i)) continue;
                    if (name.split(/\s*-\s*/).every(p => /^\d*DAT\d*$/i.test(p))) continue;

                    const values = [];
                    const letters = [];

                    // Parse data columns starting from firstDataCol
                    for (let j = firstDataCol; j < parts.length; j++) {
                        const cell = parts[j];
                        if (!cell) {
                            // Empty cell - might need to add placeholder if we're tracking positions
                            continue;
                        }
                        
                        // Try to match number with optional letter group (e.g., "45.2a" or "45.2 ab" or just "45.2")
                        const match = cell.match(/^(\d+\.?\d*)\s*([a-zA-Z]*)$/);
                        
                        if (match) {
                            const num = parseFloat(match[1]);
                            if (!isNaN(num)) {
                                values.push(num);
                                letters.push(match[2] || '');
                            }
                        } else if (cell.match(/^[a-zA-Z]+$/)) {
                            // Standalone letter group - append to previous value's letters if exists
                            if (letters.length > 0 && letters[letters.length - 1] === '') {
                                letters[letters.length - 1] = cell;
                            }
                        }
                    }

                    if (values.length > 0) {
                        // Ensure letters array matches values array length
                        while (letters.length < values.length) {
                            letters.push('');
                        }
                        treatments.push({ name, values, letters });
                    }
                }

                if (treatments.length === 0) throw new Error('No valid treatment data found');
                if (dates.length === 0) throw new Error('No dates found in header');
                
                // Validate that all treatments have same number of values as dates
                const expectedLength = dates.length;
                treatments.forEach(t => {
                    if (t.values.length !== expectedLength) {
                        console.warn(`Treatment "${t.name}" has ${t.values.length} values but expected ${expectedLength}`);
                    }
                });

                tab.treatments = treatments;
                tab.dates = dates;
                tab.currentDateIndex = 0;

                createGraph(tabId);
                updateLegend(tabId, 0);
                updateNavigation(tabId);
                addTimelineLine(tabId, 0);

                // Update tab name if it's still default
                if (tab.name.startsWith('Graph ')) {
                    tab.name = tab.graphTitle.substring(0, 20) + (tab.graphTitle.length > 20 ? '...' : '');
                    renderTabs();
                }

                statusEl.className = 'status success';
                statusEl.textContent = `Loaded ${treatments.length} treatments across ${dates.length} dates`;
                
                updateTabCount();
                
                autoSave();

            } catch (e) {
                statusEl.className = 'status error';
                statusEl.textContent = 'Error: ' + e.message;
            }
        }

        function createGraph(tabId) {
            const tab = tabs.find(t => t.id === tabId);
            const plotEl = document.getElementById('graphPlot_' + tabId);
            plotEl.innerHTML = '';

            const isReport = !!tab.reportMode;
            const isBar = tab.chartType === 'bar';
            const tickSuffix = tab.yAxisPercent ? '%' : '';
            const hoverSuffix = tab.yAxisPercent ? '%' : '';
            const lineShape = isReport ? 'linear' : 'spline';

            const traces = tab.treatments.map((t, i) => {
                const isHidden = tab.hiddenTreatments.has(t.name);
                const color = colors[i % colors.length];

                if (isBar) {
                    return {
                        x: tab.dates,
                        y: isHidden ? tab.dates.map(() => null) : t.values,
                        type: 'bar',
                        name: t.name,
                        marker: {
                            color: color,
                            opacity: 0.85,
                            line: { color: color, width: 1 }
                        },
                        hovertemplate: '<b>' + t.name + '</b><br>%{x}<br>%{y:.1f}' + hoverSuffix + '<extra></extra>',
                        visible: isHidden ? 'legendonly' : true
                    };
                } else {
                    return {
                        x: tab.dates,
                        y: isHidden ? tab.dates.map(() => null) : t.values,
                        mode: 'lines+markers',
                        name: t.name,
                        line: { color: color, width: 3, shape: lineShape },
                        marker: { size: 8, color: color },
                        hovertemplate: '<b>' + t.name + '</b><br>%{x}<br>%{y:.1f}' + hoverSuffix + '<extra></extra>',
                        visible: isHidden ? 'legendonly' : true
                    };
                }
            });

            const legendCfg = isReport
                ? { showlegend: true, legend: { font: { size: 10, color: 'rgba(255,255,255,0.7)', family: 'Montserrat, sans-serif' }, bgcolor: 'rgba(0,0,0,0)', borderwidth: 0, orientation: 'v', x: 1.02, xanchor: 'left', y: 1, yanchor: 'top', traceorder: 'normal' } }
                : { showlegend: false };

            const barLayout = isBar ? { barmode: 'group', bargap: 0.15, bargroupgap: 0.1 } : {};

            Plotly.newPlot(plotEl, traces, {
                title: { text: tab.graphTitle, font: { size: 28, color: 'rgba(255,255,255,0.95)', family: 'Montserrat, sans-serif', weight: 700 }, x: 0.5, xanchor: 'center', y: 0.95, yanchor: 'top' },
                xaxis: { title: { text: tab.xAxisLabel, font: { size: 12, color: 'rgba(255,255,255,0.6)', family: 'Montserrat, sans-serif' } }, showgrid: true, gridcolor: 'rgba(255,255,255,0.05)', tickangle: -45, tickfont: { size: 10, color: 'rgba(255,255,255,0.5)', family: 'Montserrat, sans-serif' } },
                yaxis: { title: { text: tab.yAxisLabel, font: { size: 12, color: 'rgba(255,255,255,0.6)', family: 'Montserrat, sans-serif' } }, range: [tab.yAxisMin, tab.yAxisMax], showgrid: true, gridcolor: 'rgba(255,255,255,0.05)', tickfont: { size: 10, color: 'rgba(255,255,255,0.5)', family: 'Montserrat, sans-serif' }, ticksuffix: tickSuffix },
                plot_bgcolor: 'rgba(0,0,0,0)',
                paper_bgcolor: 'rgba(0,0,0,0)',
                ...legendCfg,
                ...barLayout,
                margin: { l: 55, r: isReport ? 180 : 20, t: 60, b: 80 },
                autosize: true,
                images: [{
                    source: logoPath,
                    xref: 'paper',
                    yref: 'paper',
                    x: 0.5,
                    y: 0.5,
                    sizex: 1.1,
                    sizey: 1.1,
                    xanchor: 'center',
                    yanchor: 'middle',
                    opacity: 0.12,
                    layer: 'above'
                }]
            }, { responsive: true, displayModeBar: false });

        }

        function addTimelineLine(tabId, dateIndex) {
            const tab = tabs.find(t => t.id === tabId);
            const plotEl = document.getElementById('graphPlot_' + tabId);

            const oldLine = plotEl.querySelector('.timeline-indicator');
            if (oldLine) oldLine.remove();

            if (!tab.dates.length) return;
            if (tab.reportMode) return;
            
            const plotArea = plotEl._fullLayout;
            if (!plotArea) return;
            
            const xaxis = plotArea.xaxis;
            const yaxis = plotArea.yaxis;
            if (!xaxis || !yaxis) return;
            
            const xPixel = xaxis.l2p(dateIndex) + xaxis._offset;
            const yTop = yaxis._offset;
            const yBottom = yaxis._offset + yaxis._length;
            
            const line = document.createElement('div');
            line.className = 'timeline-indicator';
            line.style.cssText = `position:absolute;left:${xPixel}px;top:${yTop}px;width:2px;height:${yBottom - yTop}px;background:linear-gradient(180deg,rgba(16,185,129,0.8),rgba(99,102,241,0.8));border-radius:1px;box-shadow:0 0 10px rgba(16,185,129,0.5);pointer-events:none;z-index:50;transform:translateX(-1px);`;
            
            const dot = document.createElement('div');
            dot.style.cssText = 'position:absolute;left:-4px;top:-5px;width:10px;height:10px;background:#10b981;border-radius:50%;box-shadow:0 0 10px rgba(16,185,129,0.6);';
            line.appendChild(dot);
            
            plotEl.style.position = 'relative';
            plotEl.appendChild(line);
        }

        function updateLegend(tabId, dateIndex) {
            const tab = tabs.find(t => t.id === tabId);
            if (!tab || !tab.treatments.length) return;
            
            const sorted = tab.treatments.map((t, i) => ({
                ...t,
                color: colors[i % colors.length],
                valueAtDate: t.values[dateIndex] !== undefined ? t.values[dateIndex] : 0,
                letterAtDate: (t.letters && t.letters[dateIndex]) || ''
            })).filter(t => t.valueAtDate !== undefined)
              .sort((a, b) => tab.legendAscending ? a.valueAtDate - b.valueAtDate : b.valueAtDate - a.valueAtDate);

            document.getElementById('legendDateDisplay_' + tabId).textContent = tab.dates[dateIndex] || '-';

            const letters = [...new Set(sorted.flatMap(s => s.letterAtDate.split('')).filter(l => l))].sort();
            const brackets = letters.map(letter => {
                let start = -1, end = -1;
                sorted.forEach((s, i) => {
                    if (s.letterAtDate.includes(letter)) {
                        if (start === -1) start = i;
                        end = i;
                    }
                });
                return { letter, start, end };
            });

            const itemHeight = 28;
            const bracketWidth = Math.max(40, letters.length * 14 + 16);
            let html = `<div style="display:flex;position:relative;"><svg width="${bracketWidth}" height="${sorted.length * itemHeight + 8}" style="flex-shrink:0;">`;

            brackets.forEach((b, i) => {
                const color = bracketColors[i % bracketColors.length];
                const x = bracketWidth - 8 - (i * 12);
                const y1 = b.start * itemHeight + 8;
                const y2 = b.end * itemHeight + itemHeight - 4;
                html += `<path d="M ${x+5} ${y1} L ${x+3} ${y1} Q ${x} ${y1} ${x} ${y1+3} L ${x} ${y2-3} Q ${x} ${y2} ${x+3} ${y2} L ${x+5} ${y2}" stroke="${color}" stroke-width="2" fill="none"/>`;
                html += `<text x="${x-4}" y="${(y1+y2)/2}" text-anchor="middle" dominant-baseline="middle" fill="${color}" font-weight="700" font-size="9">${b.letter}</text>`;
            });

            html += `</svg><div style="flex:1;padding-left:4px;">`;
            const suffix = tab.yAxisPercent ? '%' : '';
            sorted.forEach(s => {
                const val = (typeof s.valueAtDate === 'number') ? s.valueAtDate.toFixed(1) : '0.0';
                const isHidden = tab.hiddenTreatments.has(s.name);
                const hiddenClass = isHidden ? ' hidden-treatment' : '';
                html += `<div class="legend-item${hiddenClass}" style="height:${itemHeight}px" onclick="toggleTreatment('${tabId}', '${s.name.replace(/'/g, "\\'")}')"><div class="legend-color" style="background:${s.color}"></div><span class="legend-name">${s.name}</span><span class="legend-value">${val}${suffix}</span></div>`;
            });
            html += '</div></div>';

            document.getElementById('legendContent_' + tabId).innerHTML = html;
        }

        function updateNavigation(tabId) {
            const tab = tabs.find(t => t.id === tabId);
            document.getElementById('prevBtn_' + tabId).disabled = tab.currentDateIndex === 0;
            document.getElementById('nextBtn_' + tabId).disabled = tab.currentDateIndex === tab.dates.length - 1;
            document.getElementById('dateDisplay_' + tabId).textContent = tab.dates[tab.currentDateIndex] || '-';
        }

        function navigateDate(tabId, direction) {
            const tab = tabs.find(t => t.id === tabId);
            const newIndex = tab.currentDateIndex + direction;
            if (newIndex >= 0 && newIndex < tab.dates.length) {
                tab.currentDateIndex = newIndex;
                updateLegend(tabId, newIndex);
                updateNavigation(tabId);
                addTimelineLine(tabId, newIndex);
            }
        }

        function toggleSort(tabId) {
            const tab = tabs.find(t => t.id === tabId);
            tab.legendAscending = !tab.legendAscending;
            document.getElementById('toggleBtn_' + tabId).textContent = tab.legendAscending ? '↑ Low - Top' : '↓ High - Top';
            updateLegend(tabId, tab.currentDateIndex);
        }

        function toggleTreatment(tabId, treatmentName) {
            const tab = tabs.find(t => t.id === tabId);
            if (tab.hiddenTreatments.has(treatmentName)) {
                tab.hiddenTreatments.delete(treatmentName);
            } else {
                // Don't allow hiding all treatments
                const visibleCount = tab.treatments.length - tab.hiddenTreatments.size;
                if (visibleCount <= 1) return;
                tab.hiddenTreatments.add(treatmentName);
            }
            createGraph(tabId);
            updateLegend(tabId, tab.currentDateIndex);
            addTimelineLine(tabId, tab.currentDateIndex);
        }

        function toggleChartType(tabId) {
            const tab = tabs.find(t => t.id === tabId);
            tab.chartType = tab.chartType === 'line' ? 'bar' : 'line';
            const btn = document.getElementById('chartTypeToggle_' + tabId);
            if (tab.chartType === 'bar') {
                btn.textContent = 'Line Chart';
                btn.classList.add('active');
            } else {
                btn.textContent = 'Bar Chart';
                btn.classList.remove('active');
            }
            if (tab.dates.length > 0) {
                createGraph(tabId);
                updateLegend(tabId, tab.currentDateIndex);
                addTimelineLine(tabId, tab.currentDateIndex);
            }
        }

        function setupDivider(tabId) {
            const divider = document.getElementById('divider_' + tabId);
            const legend = document.getElementById('legendPanel_' + tabId);
            let dragging = false;

            divider.addEventListener('mousedown', () => {
                dragging = true;
                document.body.classList.add('no-select');
            });

            document.addEventListener('mousemove', (e) => {
                if (!dragging) return;
                const container = divider.closest('.resizable-container');
                const rect = container.getBoundingClientRect();
                const newWidth = Math.max(220, Math.min(600, rect.right - e.clientX - 6));
                legend.style.width = newWidth + 'px';
                Plotly.Plots.resize('graphPlot_' + tabId);
            });

            document.addEventListener('mouseup', () => {
                if (dragging) {
                    dragging = false;
                    document.body.classList.remove('no-select');
                    const tab = tabs.find(t => t.id === tabId);
                    if (tab && tab.dates.length > 0) {
                        Plotly.Plots.resize('graphPlot_' + tabId);
                        addTimelineLine(tabId, tab.currentDateIndex);
                    }
                }
            });
        }

        let inputPanelsCollapsed = false;

        function toggleInputPanel() {
            inputPanelsCollapsed = !inputPanelsCollapsed;
            
            // Toggle all input panels
            document.querySelectorAll('.input-panel').forEach(panel => {
                if (inputPanelsCollapsed) {
                    panel.classList.add('collapsed');
                } else {
                    panel.classList.remove('collapsed');
                }
            });
            
            // Resize all graphs after collapse/expand
            setTimeout(() => {
                tabs.forEach(tab => {
                    if (tab.dates.length > 0) {
                        Plotly.Plots.resize('graphPlot_' + tab.id);
                        addTimelineLine(tab.id, tab.currentDateIndex);
                    }
                });
            }, 350);
        }

        function clearInput(tabId) {
            document.getElementById('dataInput_' + tabId).value = '';
            document.getElementById('status_' + tabId).className = 'status';
            document.getElementById('graphPlot_' + tabId).innerHTML = `
                <div class="empty-graph">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M3 3v18h18M7 14l4-4 4 4 5-5"/>
                    </svg>
                    <p>Paste data and click Generate</p>
                </div>
            `;
            document.getElementById('legendContent_' + tabId).innerHTML = '<div class="legend-empty">Generate a graph to see rankings</div>';
            document.getElementById('legendDateDisplay_' + tabId).textContent = '-';
            
            const tab = tabs.find(t => t.id === tabId);
            tab.treatments = [];
            tab.dates = [];
            tab.currentDateIndex = 0;
            
            updateNavigation(tabId);
            updateTabCount();
            
            autoSave();
        }

        function resetZoom(tabId) {
            const tab = tabs.find(t => t.id === tabId);
            if (tab && tab.dates.length > 0) {
                Plotly.relayout('graphPlot_' + tabId, {
                    'xaxis.autorange': true,
                    'yaxis.autorange': true
                });
            }
        }

        async function screenshotToClipboard(tabId) {
            const tab = tabs.find(t => t.id === tabId);
            if (!tab || tab.dates.length === 0) {
                alert('Generate a graph first');
                return;
            }

            const btn = event.target.closest('.screenshot-btn');
            const originalText = btn.textContent;
            btn.textContent = '⏳ Copying...';
            btn.classList.add('copying');

            const isReport = !!tab.reportMode;

            try {
                await document.fonts.ready;
                await new Promise(resolve => setTimeout(resolve, 200));

                const container = document.querySelector('#content_' + tabId + ' .resizable-container');

                const originalWidth = container.style.width;
                const originalHeight = container.style.height;
                const originalBackground = container.style.background;
                const legendPanel = container.querySelector('.legend-panel');
                const originalLegendWidth = legendPanel.style.width;
                const divider = container.querySelector('.divider');
                const originalDividerDisplay = divider.style.display;
                const originalLegendDisplay = legendPanel.style.display;

                divider.style.display = 'none';

                if (isReport) {
                    // --- Report mode: landscape A4 Word document format ---
                    // Landscape A4 printable area ≈ 24.7cm × 17cm ≈ 1460 × 1005 px at 150dpi
                    // We use the table's natural width if wider, so no dates get cut off
                    const plotId = 'graphPlot_' + tabId;
                    legendPanel.style.display = 'none';

                    // 1. Measure the table's natural width first
                    const tableEl = document.getElementById('reportTable_' + tabId);
                    let naturalTableWidth = 1460; // landscape A4 minimum
                    if (tableEl && tableEl.innerHTML) {
                        // Temporarily make table auto-width to measure
                        const origW = tableEl.style.width;
                        const origMW = tableEl.style.maxWidth;
                        const origOF = tableEl.style.overflow;
                        tableEl.style.width = 'max-content';
                        tableEl.style.maxWidth = 'none';
                        tableEl.style.overflow = 'visible';
                        const measured = tableEl.scrollWidth + 48; // +padding
                        tableEl.style.width = origW;
                        tableEl.style.maxWidth = origMW;
                        tableEl.style.overflow = origOF;
                        naturalTableWidth = Math.max(naturalTableWidth, measured);
                    }

                    const captureWidth = naturalTableWidth;
                    const graphHeight = 560; // graph portion height

                    // Set container to match full width
                    container.style.width = captureWidth + 'px';
                    container.style.height = graphHeight + 'px';
                    container.style.background = '#ffffff';

                    // Restyle Plotly for print: white bg, black text, bigger fonts
                    await Plotly.relayout(plotId, {
                        'paper_bgcolor': '#ffffff',
                        'plot_bgcolor': '#ffffff',
                        'title.font.color': '#000000',
                        'title.font.size': 32,
                        'xaxis.tickfont.color': '#333333',
                        'xaxis.tickfont.size': 14,
                        'xaxis.title.font.color': '#222222',
                        'xaxis.title.font.size': 16,
                        'xaxis.gridcolor': 'rgba(0,0,0,0.1)',
                        'yaxis.tickfont.color': '#333333',
                        'yaxis.tickfont.size': 14,
                        'yaxis.title.font.color': '#222222',
                        'yaxis.title.font.size': 16,
                        'yaxis.gridcolor': 'rgba(0,0,0,0.1)',
                        'legend.font.color': '#333333',
                        'legend.font.size': 14,
                        'margin.r': 200
                    });

                    await new Promise(resolve => {
                        Plotly.Plots.resize(plotId);
                        setTimeout(resolve, 400);
                    });

                    // Capture graph
                    const graphCanvas = await html2canvas(container, {
                        backgroundColor: '#ffffff',
                        scale: 2,
                        useCORS: true,
                        allowTaint: true,
                        logging: false
                    });

                    // 2. Capture the data table with print styles
                    let tableCanvas = null;
                    if (tableEl && tableEl.innerHTML) {
                        const origTableStyles = tableEl.getAttribute('style') || '';
                        tableEl.style.width = captureWidth + 'px';
                        tableEl.style.background = '#ffffff';
                        tableEl.style.padding = '4px 24px 24px';

                        const caption = tableEl.querySelector('.report-table caption');
                        const ths = tableEl.querySelectorAll('.report-table th');
                        const tds = tableEl.querySelectorAll('.report-table td');
                        const rows = tableEl.querySelectorAll('.report-table tr');
                        const table = tableEl.querySelector('.report-table');

                        const origCapStyle = caption ? caption.getAttribute('style') : '';
                        const origThStyles = [];
                        const origTdStyles = [];
                        const origRowStyles = [];
                        const origTableStyle = table ? table.getAttribute('style') : '';

                        if (caption) {
                            caption.style.color = '#000000';
                            caption.style.fontSize = '1.2em';
                            caption.style.paddingBottom = '10px';
                        }
                        if (table) {
                            table.style.fontSize = '0.9em';
                            table.style.width = '100%';
                        }
                        ths.forEach(th => {
                            origThStyles.push(th.getAttribute('style') || '');
                            th.style.background = '#f0f0f0';
                            th.style.color = '#222222';
                            th.style.border = '1px solid #cccccc';
                            th.style.padding = '8px 10px';
                            th.style.fontSize = '1em';
                            th.style.whiteSpace = 'nowrap';
                        });
                        tds.forEach(td => {
                            origTdStyles.push(td.getAttribute('style') || '');
                            td.style.color = '#333333';
                            td.style.border = '1px solid #dddddd';
                            td.style.padding = '7px 10px';
                            td.style.fontSize = '1em';
                        });
                        tableEl.querySelectorAll('.report-table td:first-child').forEach(td => {
                            td.style.color = '#000000';
                        });
                        rows.forEach(row => {
                            origRowStyles.push(row.getAttribute('style') || '');
                            row.style.background = 'transparent';
                        });
                        tableEl.querySelectorAll('.report-table tbody tr:nth-child(even)').forEach(row => {
                            row.style.background = '#f8f8f8';
                        });
                        tableEl.querySelectorAll('.letter-cell').forEach(el => {
                            el.style.color = '#888888';
                        });

                        tableCanvas = await html2canvas(tableEl, {
                            backgroundColor: '#ffffff',
                            scale: 2,
                            useCORS: true,
                            allowTaint: true,
                            logging: false
                        });

                        // Restore table styles
                        tableEl.setAttribute('style', origTableStyles);
                        if (caption) caption.setAttribute('style', origCapStyle || '');
                        if (table) table.setAttribute('style', origTableStyle || '');
                        ths.forEach((th, i) => th.setAttribute('style', origThStyles[i] || ''));
                        tds.forEach((td, i) => td.setAttribute('style', origTdStyles[i] || ''));
                        rows.forEach((row, i) => row.setAttribute('style', origRowStyles[i] || ''));
                        tableEl.querySelectorAll('.letter-cell').forEach(el => el.style.color = '');
                    }

                    // Restore Plotly to dark theme
                    await Plotly.relayout(plotId, {
                        'paper_bgcolor': 'rgba(0,0,0,0)',
                        'plot_bgcolor': 'rgba(0,0,0,0)',
                        'title.font.color': 'rgba(255,255,255,0.95)',
                        'title.font.size': 28,
                        'xaxis.tickfont.color': 'rgba(255,255,255,0.5)',
                        'xaxis.tickfont.size': 10,
                        'xaxis.title.font.color': 'rgba(255,255,255,0.6)',
                        'xaxis.title.font.size': 12,
                        'xaxis.gridcolor': 'rgba(255,255,255,0.05)',
                        'yaxis.tickfont.color': 'rgba(255,255,255,0.5)',
                        'yaxis.tickfont.size': 10,
                        'yaxis.title.font.color': 'rgba(255,255,255,0.6)',
                        'yaxis.title.font.size': 12,
                        'yaxis.gridcolor': 'rgba(255,255,255,0.05)',
                        'legend.font.color': 'rgba(255,255,255,0.7)',
                        'legend.font.size': 10,
                        'margin.r': 180
                    });

                    // 3. Stitch graph + table onto landscape canvas with border
                    const scale = 2;
                    const padding = 20 * scale;
                    const borderWidth = 2 * scale;
                    const gw = graphCanvas.width;
                    const gh = graphCanvas.height;
                    const tw = tableCanvas ? tableCanvas.width : 0;
                    const th = tableCanvas ? tableCanvas.height : 0;

                    // Use the wider of graph or table as content width
                    const contentWidth = Math.max(gw, tw);
                    const contentHeight = gh + th;
                    const finalWidth = contentWidth + (padding * 2) + (borderWidth * 2);
                    const finalHeight = contentHeight + (padding * 2) + (borderWidth * 2);

                    const finalCanvas = document.createElement('canvas');
                    finalCanvas.width = finalWidth;
                    finalCanvas.height = finalHeight;
                    const ctx = finalCanvas.getContext('2d');

                    // White background
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, finalWidth, finalHeight);

                    // Draw border
                    ctx.strokeStyle = '#bbbbbb';
                    ctx.lineWidth = borderWidth;
                    const bOff = borderWidth / 2;
                    ctx.beginPath();
                    ctx.roundRect(bOff, bOff, finalWidth - borderWidth, finalHeight - borderWidth, 12 * scale);
                    ctx.stroke();

                    // Draw graph scaled to full content width, centered
                    const graphX = borderWidth + padding + (contentWidth - gw) / 2;
                    const graphY = borderWidth + padding;
                    ctx.drawImage(graphCanvas, graphX, graphY);

                    // Draw table scaled to full content width, centered
                    if (tableCanvas) {
                        const tableX = borderWidth + padding + (contentWidth - tw) / 2;
                        const tableY = graphY + gh;
                        ctx.drawImage(tableCanvas, tableX, tableY);
                    }

                    // Thin divider line between graph and table
                    if (tableCanvas) {
                        ctx.strokeStyle = '#dddddd';
                        ctx.lineWidth = 1 * scale;
                        const lineY = borderWidth + padding + gh;
                        ctx.beginPath();
                        ctx.moveTo(borderWidth + padding, lineY);
                        ctx.lineTo(finalWidth - borderWidth - padding, lineY);
                        ctx.stroke();
                    }

                    const blob = await new Promise(resolve => {
                        finalCanvas.toBlob(resolve, 'image/png');
                    });

                    // Restore container
                    container.style.width = originalWidth;
                    container.style.height = originalHeight;
                    container.style.background = originalBackground;
                    legendPanel.style.width = originalLegendWidth;
                    legendPanel.style.minWidth = '';
                    divider.style.display = originalDividerDisplay;
                    legendPanel.style.display = originalLegendDisplay;
                    Plotly.Plots.resize(plotId);
                    addTimelineLine(tabId, tab.currentDateIndex);

                    await navigator.clipboard.write([
                        new ClipboardItem({ 'image/png': blob })
                    ]);
                } else {
                    // --- Normal mode: capture graph + legend panel ---
                    container.style.width = '1200px';
                    container.style.height = '600px';
                    container.style.background = '#1a1a2e';
                    legendPanel.style.width = '300px';
                    legendPanel.style.minWidth = '300px';

                    await new Promise(resolve => {
                        Plotly.Plots.resize('graphPlot_' + tabId);
                        setTimeout(resolve, 200);
                    });
                    addTimelineLine(tabId, tab.currentDateIndex);
                    await new Promise(resolve => setTimeout(resolve, 300));

                    const canvas = await html2canvas(container, {
                        backgroundColor: null,
                        scale: 2,
                        useCORS: true,
                        allowTaint: true,
                        logging: false
                    });

                    const blob = await new Promise(resolve => {
                        canvas.toBlob(resolve, 'image/png');
                    });

                    container.style.width = originalWidth;
                    container.style.height = originalHeight;
                    container.style.background = originalBackground;
                    legendPanel.style.width = originalLegendWidth;
                    legendPanel.style.minWidth = '';
                    divider.style.display = originalDividerDisplay;
                    legendPanel.style.display = originalLegendDisplay;
                    Plotly.Plots.resize('graphPlot_' + tabId);
                    addTimelineLine(tabId, tab.currentDateIndex);

                    await navigator.clipboard.write([
                        new ClipboardItem({ 'image/png': blob })
                    ]);
                }

                btn.textContent = '✓ Copied!';
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove('copying');
                }, 1500);

            } catch (err) {
                console.error('Screenshot failed:', err);
                btn.textContent = '✗ Failed';
                btn.classList.remove('copying');

                if (err.name === 'NotAllowedError') {
                    alert('Clipboard access denied. Please allow clipboard permissions or use HTTPS.');
                } else {
                    alert('Screenshot failed: ' + err.message);
                }

                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            }
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            const tab = tabs.find(t => t.id === activeTabId);
            if (tab && tab.dates.length > 0) {
                Plotly.Plots.resize('graphPlot_' + activeTabId);
                addTimelineLine(activeTabId, tab.currentDateIndex);
            }
        });

        // ==================== EXCEL DRAG & DROP ====================

        // Drag and drop handlers
        let dragCounter = 0;

        document.addEventListener('dragenter', (e) => {
            e.preventDefault();
            dragCounter++;
            if (dragCounter === 1) {
                document.getElementById('dropOverlay').classList.add('active');
            }
        });

        document.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dragCounter--;
            if (dragCounter === 0) {
                document.getElementById('dropOverlay').classList.remove('active');
            }
        });

        document.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        document.addEventListener('drop', (e) => {
            e.preventDefault();
            dragCounter = 0;
            document.getElementById('dropOverlay').classList.remove('active');

            const file = e.dataTransfer.files[0];
            if (file && (file.name.endsWith('.xlsx') || file.name.endsWith('.xls') || file.name.endsWith('.csv'))) {
                handleExcelFile(file);
            }
        });

        // Process an Excel file - each sheet becomes a graph tab
        function handleExcelFile(file) {
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });

                    if (workbook.SheetNames.length === 0) {
                        alert('No sheets found in the Excel file.');
                        return;
                    }

                    // Use file name (without extension) as project name
                    const fileName = file.name.replace(/\.[^/.]+$/, '');
                    projectName = fileName;
                    document.getElementById('projectTitle').textContent = projectName;

                    let sheetsProcessed = 0;

                    workbook.SheetNames.forEach((sheetName) => {
                        const worksheet = workbook.Sheets[sheetName];
                        const sheetData = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: '' });

                        // Skip empty sheets
                        if (!sheetData || sheetData.length < 2) return;

                        // Convert sheet data to tab-separated text (the format parseAndPlot expects)
                        const tsvLines = sheetData
                            .filter(row => row.some(cell => cell !== ''))
                            .map(row => row.map(cell => cell.toString().trim()).join('\t'));
                        const tsvText = tsvLines.join('\n');

                        if (!tsvText.trim()) return;

                        // Create a new tab for this sheet
                        tabCounter++;
                        const tabId = 'tab_' + tabCounter;

                        const tab = {
                            id: tabId,
                            name: sheetName,
                            data: null,
                            graphTitle: sheetName,
                            yAxisLabel: 'Green Coverage (%)',
                            xAxisLabel: 'Assessment Date',
                            yAxisMin: 0,
                            yAxisMax: 100,
                            yAxisPercent: true,
                            treatments: [],
                            dates: [],
                            currentDateIndex: 0,
                            legendAscending: true,
                            reportMode: false,
                            chartType: 'line',
                            hiddenTreatments: new Set()
                        };

                        tabs.push(tab);
                        createTabContent(tab);

                        // Set the graph title to sheet name
                        document.getElementById('graphTitle_' + tabId).value = sheetName;

                        // Unlock the textarea and populate with data
                        const overlay = document.getElementById('passwordOverlay_' + tabId);
                        const textarea = document.getElementById('dataInput_' + tabId);
                        overlay.style.display = 'none';
                        textarea.classList.remove('locked');
                        textarea.disabled = false;
                        textarea.value = tsvText;

                        // Parse the data to get treatments (needed for auto-range)
                        parseAndPlot(tabId);

                        // Auto-detect Y axis range from the actual data
                        if (tab.treatments.length > 0) {
                            const allValues = tab.treatments.flatMap(t => t.values).filter(v => !isNaN(v));
                            if (allValues.length > 0) {
                                const minVal = Math.min(...allValues);
                                const maxVal = Math.max(...allValues);

                                // Add some padding (10% on each side)
                                const range = maxVal - minVal || 1;
                                let yMin = Math.floor((minVal - range * 0.1) * 10) / 10;
                                let yMax = Math.ceil((maxVal + range * 0.1) * 10) / 10;

                                // Round to nice numbers
                                if (range > 10) {
                                    yMin = Math.floor(yMin / 5) * 5;
                                    yMax = Math.ceil(yMax / 5) * 5;
                                }

                                // Clamp min to 0 if data is all positive
                                if (minVal >= 0) yMin = Math.max(0, yMin);

                                // Detect if values look like percentages
                                const looksLikePercent = yMax <= 100 && yMin >= 0;

                                tab.yAxisMin = yMin;
                                tab.yAxisMax = yMax;
                                tab.yAxisPercent = looksLikePercent;

                                document.getElementById('yAxisMin_' + tabId).value = yMin;
                                document.getElementById('yAxisMax_' + tabId).value = yMax;

                                const percentBtn = document.getElementById('yAxisPercent_' + tabId);
                                if (looksLikePercent) {
                                    percentBtn.classList.add('active');
                                } else {
                                    percentBtn.classList.remove('active');
                                }

                                // Re-render graph with correct axis range
                                createGraph(tabId);
                                updateLegend(tabId, 0);
                                addTimelineLine(tabId, 0);
                            }
                        }

                        sheetsProcessed++;
                    });

                    if (sheetsProcessed === 0) {
                        alert('No valid data found in the Excel file. Ensure each sheet has a header row and at least one data row.');
                        return;
                    }

                    renderTabs();
                    updateTabCount();

                    // Switch to the first newly created tab
                    if (tabs.length > 0) {
                        switchToTab(tabs[tabs.length - sheetsProcessed].id);
                    }

                    autoSave();

                } catch (err) {
                    console.error('Excel import error:', err);
                    alert('Failed to import Excel file: ' + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        }
    </script>
