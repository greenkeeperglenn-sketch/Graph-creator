        async function screenshotToClipboard(tabId) {
            const tab = tabs.find(t => t.id === tabId);
            if (!tab || tab.dates.length === 0) {
                alert('Generate a graph first');
                return;
            }

            const btn = event.target.closest('.screenshot-btn');
            const originalText = btn.textContent;
            btn.textContent = '⏳ Copying...';
            btn.classList.add('copying');

            try {
                // Wait for fonts to be ready
                await document.fonts.ready;

                // Additional delay to ensure fonts are fully loaded
                await new Promise(resolve => setTimeout(resolve, 200));

                // Get the resizable container (graph + legend)
                const container = document.querySelector('#content_' + tabId + ' .resizable-container');

                // Store original styles
                const originalWidth = container.style.width;
                const originalHeight = container.style.height;
                const originalBackground = container.style.background;
                const legendPanel = container.querySelector('.legend-panel');
                const originalLegendWidth = legendPanel.style.width;
                const divider = container.querySelector('.divider');
                const originalDividerDisplay = divider.style.display;

                // Apply fixed dimensions for consistent output
                container.style.width = '1200px';
                container.style.height = '600px';
                // Make background solid for screenshot (matches the semi-transparent grey)
                container.style.background = '#1a1a2e';
                legendPanel.style.width = '300px';
                legendPanel.style.minWidth = '300px';
                divider.style.display = 'none';

                // Resize Plotly chart to fit new dimensions
                await new Promise(resolve => {
                    Plotly.Plots.resize('graphPlot_' + tabId);
                    setTimeout(resolve, 200);
                });

                // Re-add timeline line at correct position
                addTimelineLine(tabId, tab.currentDateIndex);

                // Longer delay to ensure fonts and rendering are complete
                await new Promise(resolve => setTimeout(resolve, 300));

                // Capture the container with html2canvas (better font support)
                const canvas = await html2canvas(container, {
                    backgroundColor: null, // Transparent so we only get the container
                    scale: 2, // Higher resolution
                    useCORS: true,
                    allowTaint: true,
                    logging: false
                });

                // Convert canvas to blob
                const blob = await new Promise(resolve => {
                    canvas.toBlob(resolve, 'image/png');
                });

                // Restore original styles
                container.style.width = originalWidth;
                container.style.height = originalHeight;
                container.style.background = originalBackground;
                legendPanel.style.width = originalLegendWidth;
                legendPanel.style.minWidth = '';
                divider.style.display = originalDividerDisplay;

                // Resize back to normal
                Plotly.Plots.resize('graphPlot_' + tabId);
                addTimelineLine(tabId, tab.currentDateIndex);

                // Copy to clipboard
                await navigator.clipboard.write([
                    new ClipboardItem({ 'image/png': blob })
                ]);

                btn.textContent = '✓ Copied!';
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.classList.remove('copying');
                }, 1500);

            } catch (err) {
                console.error('Screenshot failed:', err);
                btn.textContent = '✗ Failed';
                btn.classList.remove('copying');
                
                // Provide helpful error message
                if (err.name === 'NotAllowedError') {
                    alert('Clipboard access denied. Please allow clipboard permissions or use HTTPS.');
                } else {
                    alert('Screenshot failed: ' + err.message);
                }
                
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            }
        }

        // =====================================
        // FIELD MAP FUNCTIONALITY
        // =====================================

        // Switch between Graph and Field Map views
        function switchView(tabId, view) {
            const graphArea = document.querySelector(`#content_${tabId} .main-content`);
            const fieldMapView = document.getElementById(`fieldMapView_${tabId}`);

            if (view === 'graph') {
                graphArea.style.display = 'flex';
                fieldMapView.classList.remove('active');
            } else {
                graphArea.style.display = 'none';
                fieldMapView.classList.add('active');
            }
        }

        // IndexedDB Manager for drone images
        class ImageDatabase {
            constructor() {
                this.dbName = 'stri_graph_generator_images';
                this.version = 1;
                this.db = null;
            }

            async open() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.dbName, this.version);

                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => {
                        this.db = request.result;
                        resolve(this.db);
                    };

                    request.onupgradeneeded = (event) => {
                        const db = event.target.result;
                        if (!db.objectStoreNames.contains('droneImages')) {
                            const store = db.createObjectStore('droneImages', { keyPath: 'id' });
                            store.createIndex('tabId', 'tabId', { unique: false });
                            store.createIndex('date', 'date', { unique: false });
                        }
                    };
                });
            }

            async save(imageRecord) {
                const db = await this.open();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction('droneImages', 'readwrite');
                    const store = tx.objectStore('droneImages');
                    const request = store.put(imageRecord);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async get(imageId) {
                const db = await this.open();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction('droneImages', 'readonly');
                    const store = tx.objectStore('droneImages');
                    const request = store.get(imageId);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async getAllByTab(tabId) {
                const db = await this.open();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction('droneImages', 'readonly');
                    const store = tx.objectStore('droneImages');
                    const index = store.index('tabId');
                    const request = index.getAll(tabId);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            async delete(imageId) {
                const db = await this.open();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction('droneImages', 'readwrite');
                    const store = tx.objectStore('droneImages');
                    const request = store.delete(imageId);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }
        }

        const imageDB = new ImageDatabase();

        // Generate UUID for images
        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        // Extract EXIF metadata from image
        function extractEXIF(file) {
            return new Promise((resolve) => {
                EXIF.getData(file, function() {
                    const dateStr = EXIF.getTag(this, 'DateTimeOriginal') || EXIF.getTag(this, 'DateTime');
                    const imageDate = dateStr ? parseEXIFDate(dateStr) : new Date(file.lastModified);

                    resolve({
                        dateTaken: imageDate,
                        model: EXIF.getTag(this, 'Model') || 'Unknown',
                        width: EXIF.getTag(this, 'PixelXDimension') || EXIF.getTag(this, 'ExifImageWidth'),
                        height: EXIF.getTag(this, 'PixelYDimension') || EXIF.getTag(this, 'ExifImageLength'),
                        gps: {
                            lat: EXIF.getTag(this, 'GPSLatitude'),
                            lon: EXIF.getTag(this, 'GPSLongitude'),
                            alt: EXIF.getTag(this, 'GPSAltitude')
                        }
                    });
                });
            });
        }

        // Parse EXIF date string
        function parseEXIFDate(dateStr) {
            if (!dateStr) return new Date();
            // EXIF format: "2025:01:08 13:45:30"
            const parts = dateStr.split(' ');
            const datePart = parts[0].replace(/:/g, '-');
            const timePart = parts[1] || '00:00:00';
            return new Date(`${datePart}T${timePart}`);
        }

        // Format date for display
        function formatDate(date) {
            if (typeof date === 'string') date = new Date(date);
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            return date.toLocaleDateString('en-US', options);
        }

        // Generate thumbnail
        async function generateThumbnail(file, maxWidth) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const scale = maxWidth / img.width;
                        canvas.width = maxWidth;
                        canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        // Show notification
        function showNotification(message) {
            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = message;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        // Upload drone image
        async function uploadDroneImage(file, tabId) {
            const dropZone = document.getElementById(`dropZone_${tabId}`);
            const originalHTML = dropZone.innerHTML;

            try {
                // Show loading state
                dropZone.innerHTML = `
                    <div class="drop-zone-icon">⏳</div>
                    <div class="drop-zone-text">Uploading...</div>
                    <div class="drop-zone-hint">${file.name}</div>
                `;

                // Extract EXIF data
                const exifData = await extractEXIF(file);
                const imageDate = exifData.dateTaken;

                dropZone.innerHTML = `
                    <div class="drop-zone-icon">📊</div>
                    <div class="drop-zone-text">Processing...</div>
                    <div class="drop-zone-hint">Generating thumbnail</div>
                `;

                // Generate thumbnail
                const thumbnail = await generateThumbnail(file, 200);

                dropZone.innerHTML = `
                    <div class="drop-zone-icon">💾</div>
                    <div class="drop-zone-text">Saving...</div>
                    <div class="drop-zone-hint">Storing image</div>
                `;

                // Save to IndexedDB
                const imageId = generateUUID();
                await imageDB.save({
                    id: imageId,
                    tabId: tabId,
                    date: imageDate.toISOString().split('T')[0],
                    fileName: file.name,
                    mimeType: file.type,
                    imageData: file,
                    thumbnail: thumbnail,
                    uploadedAt: new Date().toISOString(),
                    exifData: {
                        dateTaken: imageDate.toISOString(),
                        camera: exifData.model,
                        gps: exifData.gps,
                        dimensions: {
                            width: exifData.width,
                            height: exifData.height
                        }
                    }
                });

                // Refresh image library
                await renderImageLibrary(tabId);

                // Restore drop zone
                dropZone.innerHTML = originalHTML;

                showNotification(`✓ Uploaded: ${file.name}`);
            } catch (err) {
                console.error('Upload error:', err);
                dropZone.innerHTML = originalHTML;
                showNotification('❌ Upload failed: ' + err.message);
            }
        }

        // Render image library
        async function renderImageLibrary(tabId) {
            const imageList = document.getElementById(`imageList_${tabId}`);
            const images = await imageDB.getAllByTab(tabId);

            if (images.length === 0) {
                imageList.innerHTML = '<div style="text-align: center; color: rgba(255,255,255,0.3); padding: 20px; font-size: 0.9em;">No images uploaded</div>';
                return;
            }

            // Sort by date
            images.sort((a, b) => new Date(a.date) - new Date(b.date));

            imageList.innerHTML = images.map((img, index) => `
                <div class="image-item ${index === 0 ? 'active' : ''}" onclick="selectImage('${tabId}', '${img.id}')">
                    <img src="${img.thumbnail}" class="image-thumbnail" alt="${img.fileName}">
                    <div class="image-info">
                        <div class="image-date">${formatDate(img.date)}</div>
                        <div class="image-filename">${img.fileName}</div>
                    </div>
                    <div class="image-remove" onclick="event.stopPropagation(); removeImage('${tabId}', '${img.id}')">×</div>
                </div>
            `).join('');

            // Auto-select first image
            if (images.length > 0) {
                await selectImage(tabId, images[0].id);
            }
        }

        // Select and display image
        async function selectImage(tabId, imageId) {
            // Update active state
            document.querySelectorAll(`#imageList_${tabId} .image-item`).forEach(item => {
                item.classList.remove('active');
            });
            event?.target.closest('.image-item')?.classList.add('active');

            // Load and display image
            const imageRecord = await imageDB.get(imageId);
            if (!imageRecord) return;

            const imageDisplay = document.getElementById(`imageDisplay_${tabId}`);
            const imageURL = URL.createObjectURL(imageRecord.imageData);

            imageDisplay.innerHTML = `<img src="${imageURL}" alt="${imageRecord.fileName}" data-scale="1">`;

            // Show image controls
            const imageControls = document.getElementById(`imageControls_${tabId}`);
            if (imageControls) {
                imageControls.style.display = 'flex';
            }

            // Setup pan/drag functionality for the image
            const img = imageDisplay.querySelector('img');
            setupImagePan(tabId, img);
        }

        // Fit image to screen
        function fitImageToScreen(tabId) {
            const img = document.querySelector(`#imageDisplay_${tabId} img`);
            if (!img) return;

            img.classList.remove('zoomed');
            img.style.transform = 'scale(1)';
            img.dataset.scale = '1';

            // Reset scroll position
            const imageDisplay = document.getElementById(`imageDisplay_${tabId}`);
            if (imageDisplay) {
                imageDisplay.scrollLeft = 0;
                imageDisplay.scrollTop = 0;
            }
        }

        // Zoom image by factor
        function zoomImage(tabId, factor) {
            const img = document.querySelector(`#imageDisplay_${tabId} img`);
            if (!img) return;

            img.classList.add('zoomed');
            const currentScale = parseFloat(img.dataset.scale || 1);
            const newScale = Math.max(0.1, Math.min(5, currentScale * factor)); // Limit between 0.1x and 5x
            img.dataset.scale = newScale.toString();
            img.style.transform = `scale(${newScale})`;
        }

        // View image at actual size (100%)
        function viewActualSize(tabId) {
            const img = document.querySelector(`#imageDisplay_${tabId} img`);
            if (!img) return;

            img.classList.add('zoomed');
            img.style.transform = 'scale(1)';
            img.dataset.scale = '1';
        }

        // Setup pan/drag functionality for zoomed images
        function setupImagePan(tabId, img) {
            const imageDisplay = document.getElementById(`imageDisplay_${tabId}`);
            if (!imageDisplay) return;

            let isPanning = false;
            let startX = 0;
            let startY = 0;
            let scrollLeft = 0;
            let scrollTop = 0;

            imageDisplay.addEventListener('mousedown', (e) => {
                // Only pan if image is zoomed
                if (!img.classList.contains('zoomed')) return;

                isPanning = true;
                imageDisplay.style.cursor = 'grabbing';
                startX = e.pageX - imageDisplay.offsetLeft;
                startY = e.pageY - imageDisplay.offsetTop;
                scrollLeft = imageDisplay.scrollLeft;
                scrollTop = imageDisplay.scrollTop;
            });

            imageDisplay.addEventListener('mouseleave', () => {
                isPanning = false;
                if (img.classList.contains('zoomed')) {
                    imageDisplay.style.cursor = 'move';
                } else {
                    imageDisplay.style.cursor = 'grab';
                }
            });

            imageDisplay.addEventListener('mouseup', () => {
                isPanning = false;
                if (img.classList.contains('zoomed')) {
                    imageDisplay.style.cursor = 'move';
                } else {
                    imageDisplay.style.cursor = 'grab';
                }
            });

            imageDisplay.addEventListener('mousemove', (e) => {
                if (!isPanning) return;
                e.preventDefault();
                const x = e.pageX - imageDisplay.offsetLeft;
                const y = e.pageY - imageDisplay.offsetTop;
                const walkX = (x - startX) * 2; // Multiply for faster scrolling
                const walkY = (y - startY) * 2;
                imageDisplay.scrollLeft = scrollLeft - walkX;
                imageDisplay.scrollTop = scrollTop - walkY;
            });
        }

        // Remove image
        async function removeImage(tabId, imageId) {
            if (!confirm('Remove this image?')) return;

            await imageDB.delete(imageId);
            await renderImageLibrary(tabId);
            showNotification('Image removed');
        }

        // Sync treatments from graph to field map
        function syncFieldMapTreatments(tabId) {
            const tab = tabs.find(t => t.id === tabId);
            if (!tab || !tab.treatments || tab.treatments.length === 0) return;

            // Update treatment count
            const treatmentCountInput = document.getElementById(`treatmentCount_${tabId}`);
            if (treatmentCountInput) {
                treatmentCountInput.value = tab.treatments.length;
            }

            // Update treatment list in mapper
            const treatmentList = document.getElementById(`treatmentList_${tabId}`);
            if (!treatmentList) return;

            const replicates = parseInt(document.getElementById(`replicates_${tabId}`)?.value) || 4;

            treatmentList.innerHTML = tab.treatments.map((treatment, index) => {
                const color = colors[index % colors.length];
                return `
                    <div class="treatment-item">
                        <div class="treatment-header">
                            <div class="treatment-color" style="background: ${color}"></div>
                            <div class="treatment-name">${treatment.name}</div>
                        </div>
                        <div class="treatment-tile"
                             draggable="true"
                             data-treatment="${treatment.name}"
                             data-color="${color}"
                             style="background: ${color}">
                            ${treatment.name}
                            <span class="treatment-counter">${replicates}×</span>
                        </div>
                        <div class="treatment-status">
                            Ready to assign
                        </div>
                    </div>
                `;
            }).join('');

            // Setup drag handlers
            treatmentList.querySelectorAll('.treatment-tile').forEach(tile => {
                tile.addEventListener('dragstart', (e) => {
                    const treatmentName = tile.dataset.treatment;
                    const color = tile.dataset.color;
                    e.dataTransfer.setData('treatment', treatmentName);
                    e.dataTransfer.setData('color', color);
                    e.dataTransfer.effectAllowed = 'copy';
                });
            });
        }

        // Setup field map event listeners
        function setupFieldMapListeners(tabId) {
            const dropZone = document.getElementById(`dropZone_${tabId}`);

            // Update treatments when replicates change
            const replicatesInput = document.getElementById(`replicates_${tabId}`);
            if (replicatesInput) {
                replicatesInput.addEventListener('change', () => {
                    syncFieldMapTreatments(tabId);
                });
            }

            // Click to upload
            dropZone.addEventListener('click', () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.multiple = true;
                input.onchange = async (e) => {
                    const files = Array.from(e.target.files);
                    for (const file of files) {
                        await uploadDroneImage(file, tabId);
                    }
                };
                input.click();
            });

            // Drag and drop
            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('drag-over');
            });

            dropZone.addEventListener('dragleave', () => {
                dropZone.classList.remove('drag-over');
            });

            dropZone.addEventListener('drop', async (e) => {
                e.preventDefault();
                dropZone.classList.remove('drag-over');

                const files = Array.from(e.dataTransfer.files);
                for (const file of files) {
                    if (file.type.startsWith('image/')) {
                        await uploadDroneImage(file, tabId);
                    }
                }
            });
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            const tab = tabs.find(t => t.id === activeTabId);
            if (tab && tab.dates.length > 0) {
                Plotly.Plots.resize('graphPlot_' + activeTabId);
                addTimelineLine(activeTabId, tab.currentDateIndex);
            }
        });
    </script>
